name: Build Android APK (No EAS Queue)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cbk/app/**
      - .github/workflows/build-apk-local.yml

jobs:
  build-apk-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: cbk/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cbk/app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Debug APK locally via EAS CLI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_TELEMETRY: "1"
        run: npx eas-cli build --platform android --profile apk-debug --local --non-interactive --output ./build/app-debug.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbk-android-apk-debug
          path: cbk/app/build/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-apk-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: cbk/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cbk/app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Release APK locally via EAS CLI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_TELEMETRY: "1"
        run: npx eas-cli build --platform android --profile apk-release --local --non-interactive --output ./build/app-release.apk

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbk-android-apk-release
          path: cbk/app/build/app-release.apk
          if-no-files-found: error
          retention-days: 14

packages:
  "recharts": "Required for dashboard and report charts (sales, payments, forecast)"
  "framer-motion": "For premium smooth page transitions and micro-interactions"
  "date-fns": "For formatting dates and times nicely across POS and Reports"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"

images:
  - path: "artifacts/tabio/public/images/login-bg.png"
    description: "Premium abstract gradient background in deep corporate blues and soft emerald greens, smooth glassmorphism style"
    aspect_ratio: "16:9"
  - path: "artifacts/tabio/public/images/logo.png"
    description: "Modern minimalist logo mark for a restaurant tech startup, blue and green geometric leaf/plate shape, transparent background"

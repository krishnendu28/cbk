openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Tabio POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: outlets
    description: Outlet/restaurant management
  - name: menu
    description: Menu management
  - name: orders
    description: Order management
  - name: tables
    description: Table management
  - name: inventory
    description: Inventory management
  - name: reports
    description: Reports and analytics
  - name: crm
    description: CRM and loyalty
  - name: settings
    description: System settings
  - name: aggregators
    description: Zomato/Swiggy integrations
  - name: kot
    description: Kitchen Order Tickets
  - name: staff
    description: Staff/users management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # OUTLETS
  /outlets:
    get:
      operationId: getOutlets
      tags: [outlets]
      summary: List all outlets
      responses:
        "200":
          description: Outlets list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outlet"
    post:
      operationId: createOutlet
      tags: [outlets]
      summary: Create outlet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutletRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"

  /outlets/{outletId}:
    get:
      operationId: getOutlet
      tags: [outlets]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Outlet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"
    put:
      operationId: updateOutlet
      tags: [outlets]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutletRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"

  # DASHBOARD
  /outlets/{outletId}/dashboard:
    get:
      operationId: getDashboard
      tags: [outlets]
      summary: Get dashboard stats
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  # STAFF
  /outlets/{outletId}/staff:
    get:
      operationId: getStaff
      tags: [staff]
      summary: List staff
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /outlets/{outletId}/staff/{staffId}:
    put:
      operationId: updateStaff
      tags: [staff]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: staffId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
    delete:
      operationId: deleteStaff
      tags: [staff]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: staffId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # TABLES
  /outlets/{outletId}/tables:
    get:
      operationId: getTables
      tags: [tables]
      summary: List tables
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tables list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create table
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /outlets/{outletId}/tables/{tableId}:
    put:
      operationId: updateTable
      tags: [tables]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      operationId: deleteTable
      tags: [tables]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # MENU CATEGORIES
  /outlets/{outletId}/categories:
    get:
      operationId: getCategories
      tags: [menu]
      summary: List menu categories
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [menu]
      summary: Create category
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /outlets/{outletId}/categories/{categoryId}:
    put:
      operationId: updateCategory
      tags: [menu]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [menu]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # MENU ITEMS
  /outlets/{outletId}/menu-items:
    get:
      operationId: getMenuItems
      tags: [menu]
      summary: List menu items
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Menu items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create menu item
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /outlets/{outletId}/menu-items/{itemId}:
    get:
      operationId: getMenuItem
      tags: [menu]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    put:
      operationId: updateMenuItem
      tags: [menu]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ORDERS
  /outlets/{outletId}/orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /outlets/{outletId}/orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    put:
      operationId: updateOrder
      tags: [orders]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /outlets/{outletId}/orders/{orderId}/bill:
    post:
      operationId: generateBill
      tags: [orders]
      summary: Generate bill/invoice
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBillRequest"
      responses:
        "200":
          description: Bill generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /outlets/{outletId}/orders/{orderId}/kot:
    post:
      operationId: generateKot
      tags: [kot]
      summary: Generate KOT
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KOT generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KOT"

  /outlets/{outletId}/kots:
    get:
      operationId: getKots
      tags: [kot]
      summary: List KOTs
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: KOTs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KOT"

  /outlets/{outletId}/kots/{kotId}:
    put:
      operationId: updateKot
      tags: [kot]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: kotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKotRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KOT"

  # INVENTORY
  /outlets/{outletId}/inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create inventory item
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /outlets/{outletId}/inventory/{itemId}:
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /outlets/{outletId}/inventory/{itemId}/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustInventoryRequest"
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  # REPORTS
  /outlets/{outletId}/reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Sales report
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: groupBy
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /outlets/{outletId}/reports/items:
    get:
      operationId: getItemsReport
      tags: [reports]
      summary: Items sales report
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Items report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemSalesReport"

  /outlets/{outletId}/reports/payments:
    get:
      operationId: getPaymentsReport
      tags: [reports]
      summary: Payments report
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Payments report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsReport"

  /outlets/{outletId}/reports/forecast:
    get:
      operationId: getDemandForecast
      tags: [reports]
      summary: AI demand forecast (7-day)
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Forecast data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastReport"

  # CRM
  /outlets/{outletId}/customers:
    get:
      operationId: getCustomers
      tags: [crm]
      summary: List customers
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [crm]
      summary: Create customer
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /outlets/{outletId}/customers/{customerId}:
    get:
      operationId: getCustomer
      tags: [crm]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [crm]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /outlets/{outletId}/customers/{customerId}/loyalty:
    post:
      operationId: adjustLoyaltyPoints
      tags: [crm]
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustLoyaltyRequest"
      responses:
        "200":
          description: Loyalty adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  # SETTINGS
  /outlets/{outletId}/settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get outlet settings
      parameters:
        - name: outletId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":

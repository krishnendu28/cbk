        status:
          type: string
          enum: [new, accepted, preparing, ready, picked, delivered, cancelled]
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: integer
              price:
                type: number
            required: [name, quantity, price]
        subtotal:
          type: number
        totalAmount:
          type: number
        estimatedDelivery:
          type: string
        createdAt:
          type: string
      required: [id, platform, status, customerName, customerPhone, deliveryAddress, items, subtotal, totalAmount, estimatedDelivery, createdAt]

    RejectOrderRequest:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    MenuSyncResponse:
      type: object
      properties:
        success:
          type: boolean
        zomatoSynced:
          type: boolean
        swiggySynced:
          type: boolean
        message:
          type: string
      required: [success, zomatoSynced, swiggySynced, message]
